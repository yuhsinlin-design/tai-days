<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="pin-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <!-- Metallic dome: bright at top-left (light source), cool grey at bottom-right -->
    <radialGradient id="pin-fill" cx="38%" cy="32%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#efefef"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </radialGradient>
    <!-- Rim: light at top, dark at bottom — gives the ring a 3-D bevel -->
    <linearGradient id="pin-rim" x1="5" y1="3" x2="15" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e0e0e0"/>
      <stop offset="50%"  stop-color="#a8a8a8"/>
      <stop offset="100%" stop-color="#686868"/>
    </linearGradient>
  </defs>
  <g filter="url(#pin-shadow)">
    <circle cx="10" cy="8" r="6"   fill="url(#pin-fill)"/>
    <circle cx="10" cy="8" r="5.5" stroke="url(#pin-rim)" stroke-width="1"/>
    <!-- Specular highlight — short bright arc at top-left of the ring -->
    <path d="M 7.2 5.2 A 3.8 3.8 0 0 1 11.2 4.4"
          stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.75"/>
  </g>
</svg>
